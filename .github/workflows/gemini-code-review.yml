name: "AI Code Review"

on:
  pull_request:
    branches: [master]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get PR diff
        env:
          PULL_REQUEST_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git diff "origin/${{ github.event.pull_request.base.ref }}" > diff.txt

      - name: Code Review by Gemini AI
        uses: rubensflinco/gemini-code-review-action@1.0.5
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repository: ${{ github.repository }}
          github_pull_request_number: ${{ github.event.pull_request.number }}
          git_commit_hash: ${{ github.event.pull_request.head.sha }}
          pull_request_diff: ${{ github.workspace }}/diff.txt
          pull_request_diff_chunk_size: 3500
          model: gemini-1.5-pro-latest
          extra_prompt: |
            This is a Python chatbot using the Anthropic SDK and Pydantic.
            Focus on: Python best practices, security issues, correct Anthropic SDK usage, and Pydantic model correctness.